version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: stockmaster-db
    environment:
      POSTGRES_DB: ${DB_NAME:-stockmaster}
      POSTGRES_USER: ${DB_USERNAME:-stockmaster}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-stockmaster123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-stockmaster}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: stockmaster-backend
    environment:
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-stockmaster}
      DB_USERNAME: ${DB_USERNAME:-stockmaster}
      DB_PASSWORD: ${DB_PASSWORD:-stockmaster123}
      JWT_SECRET: ${JWT_SECRET:-stockmaster-super-secret-key-that-is-at-least-256-bits-long-for-hs256}
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: stockmaster-frontend
    ports:
      - "3001:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
