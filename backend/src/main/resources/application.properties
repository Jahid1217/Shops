spring.application.name=stockmaster-backend

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/stockmaster}
spring.datasource.username=${DB_USERNAME:stockmaster}
spring.datasource.password=${DB_PASSWORD:stockmaster123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:stockmaster-super-secret-key-that-is-at-least-256-bits-long-for-hs256}
jwt.expiration=86400000

# CORS
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://localhost:3001,http://localhost:5173,http://localhost,http://127.0.0.1:*,https://*.ngrok-free.dev,https://*.ngrok.io}

# Server
server.port=8080

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
